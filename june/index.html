<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantation June Revenue Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }
        .metric { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .label { color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 24px; font-weight: bold; }
        .value.membership { color: #ffc107; }
        .value.mtd { color: #4dd0e1; }
        .value.target { color: #81c784; }
        .value.projection { color: #ffb74d; }
        .daily-log {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .day {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .day-name { color: #888; font-size: 12px; margin-bottom: 4px; }
        .day-revenue { font-size: 18px; font-weight: bold; color: #4dd0e1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Plantation June</h1>
        <p class="subtitle">Daily pace tracker through June 30</p>

        <div class="card">
            <div class="metric">
                <span class="label">Membership (June 1)</span>
                <span class="value membership">$11,908</span>
            </div>
        </div>

        <div class="card">
            <div class="metric">
                <span class="label">May Revenue</span>
                <span class="value">$28,167</span>
            </div>
            <div class="metric">
                <span class="label">Target (May +10%)</span>
                <span class="value target">$30,984</span>
            </div>
        </div>

        <div class="card">
            <div class="metric">
                <span class="label">MTD Total (June 2-16)</span>
                <span class="value mtd" id="mtdValue">$21,412</span>
            </div>
            <div class="metric">
                <span class="label">June 30 Projection</span>
                <span class="value projection" id="projValue">$28,997</span>
            </div>
            <div class="metric">
                <span class="label">Daily Avg (Add-ons)</span>
                <span class="value" id="avgValue">$633/day</span>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 16px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #aaa;">Your Daily Log (June 2-30)</h3>
            <div class="daily-log" id="dailyLog"></div>
        </div>
    </div>

    <script>
        // Revenue data from MyTime for June 2-16
        const dailyData = {
            2: 529.00, 3: 473.00, 4: 399.00, 5: 557.00, 6: 1190.00,
            7: 659.00, 8: 569.00, 9: 616.50, 10: 1139.00, 11: 428.00,
            12: 469.49, 13: 1002.24, 14: 399.00, 15: 660.00, 16: 414.50
        };

        const membership = 11908;
        const daysInJune = 30;

        // Calculate totals
        const totalAddOns = Object.values(dailyData).reduce((a, b) => a + b, 0);
        const mtdTotal = membership + totalAddOns;
        const daysCompleted = Object.keys(dailyData).length;
        const daysRemaining = daysInJune - 1 - daysCompleted;
        const dailyAvg = (totalAddOns / daysCompleted).toFixed(2);
        const projection = mtdTotal + (dailyAvg * daysRemaining);

        // Update display
        document.getElementById('mtdValue').textContent = '$' + mtdTotal.toLocaleString('en-US', {minimumFractionDigits: 2});
        document.getElementById('projValue').textContent = '$' + Math.round(projection).toLocaleString();
        document.getElementById('avgValue').textContent = '$' + dailyAvg + '/day';

        // Render daily log
        const logContainer = document.getElementById('dailyLog');
        for (let day = 2; day <= 30; day++) {
            const dayEl = document.createElement('div');
            dayEl.className = 'day';
            if (dailyData[day]) {
                dayEl.innerHTML = `<div class="day-name">June ${day}</div><div class="day-revenue">$${dailyData[day].toFixed(2)}</div>`;
            } else {
                dayEl.innerHTML = `<div class="day-name">June ${day}</div><div class="day-revenue" style="color: #666;">—</div>`;
            }
            logContainer.appendChild(dayEl);
        }

        // PWA service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
