<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantation June Revenue Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }
        .metric { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .label { color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 24px; font-weight: bold; }
        .value.membership { color: #ffc107; }
        .value.mtd { color: #4dd0e1; }
        .value.target { color: #81c784; }
        .value.projection { color: #ffb74d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Plantation June</h1>
        <p class="subtitle">Daily pace tracker through June 30</p>

        <div class="card">
            <div class="metric">
                <span class="label">Membership (June 1)</span>
                <span class="value membership">$11,909</span>
            </div>
        </div>

        <div class="card">
            <div class="metric">
                <span class="label">May Revenue</span>
                <span class="value">$28,167</span>
            </div>
            <div class="metric">
                <span class="label">Target (May +10%)</span>
                <span class="value target">$30,984</span>
            </div>
        </div>

        <div class="card">
            <div class="metric">
                <span class="label">MTD Total (June 1-19)</span>
                <span class="value mtd">$22,755</span>
            </div>
            <div class="metric">
                <span class="label">June 30 Projection</span>
                <span class="value projection">$29,384</span>
            </div>
            <div class="metric">
                <span class="label">Daily Avg (Add-ons)</span>
                <span class="value">$603/day</span>
            </div>
            <div class="metric">
                <span class="label">Status</span>
                <span class="value target">→ 5% below target</span>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
